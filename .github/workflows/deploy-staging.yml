name: Deploy to staging

on:
  push:
    branches: [main]

jobs:
  staging:
    uses: dracor-org/dracor-blog/.github/workflows/deployment.yml@main
    with:
      host: blog.staging.dracor.org
      deploy-path: /var/www/blog
    secrets:
      deploy-key: ${{ secrets.DRACOR_ORG_DEPLOY_KEY }}
      deploy-user: ${{ secrets.DRACOR_ORG_DEPLOY_USER }}
